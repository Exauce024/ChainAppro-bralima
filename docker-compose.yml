version: '3.8'

services:
  # Service Base de Données MariaDB (compatible MySQL, gère nativement le IF NOT EXISTS sur les index)
  db:
    image: mariadb:10.11
    container_name: bralima-db-group
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass_group}
      MYSQL_DATABASE: ${DB_NAME:-gestionstocks}
      MYSQL_USER: ${DB_USER:-bralima_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bralima_pass_group}
    volumes:
      # Persistance des données MariaDB sur le VPS
      - mysql_data:/var/lib/mysql
      # Initialisation automatique de la structure de la BDD à partir de gestionstocks.sql
      - ./gestionstocks.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # Port MySQL non exposé publiquement sur le VPS pour des raisons de sécurité.
      # L'application Node.js y accède en interne via le réseau Docker sur le port 3306.
      - "127.0.0.1:${DB_EXTERNAL_PORT:-3306}:3306"
    networks:
      - bralima-network

  # Service Application Node.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bralima-app-group
    restart: always
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 4000
      # Connexion à la BDD via le nom du service Docker "db"
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-bralima_user}
      DB_PASSWORD: ${DB_PASSWORD:-bralima_pass_group}
      DB_NAME: ${DB_NAME:-gestionstocks}
      DB_SSL_DISABLE: ${DB_SSL_DISABLE:-true} # Transmet le flag de désactivation SSL au conteneur
      SESSION_SECRET: ${SESSION_SECRET:-bralima-super-secret-production-2026}
      BASE_URL: ${BASE_URL:-http://localhost:4001}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-exaucebanza04@gmail.com}
      EMAIL_PASS: ${EMAIL_PASS:-hdal bwys eojg mwjb}
    ports:
      # Port exposé sur la machine hôte (le VPS).
      # Permet à chaque groupe de définir un port unique (ex: 4001, 4002, 4003, 4004) dans son fichier .env
      - "${HOST_PORT:-4001}:4000"
    volumes:
      # Persistance des PDFs générés (Bons de commande, etc.)
      - app_storage:/usr/src/app/storage
    networks:
      - bralima-network

volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local

networks:
  bralima-network:
    driver: bridge
